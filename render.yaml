services:
  - type: web
    name: career-curator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CAREER_NET_API_KEY
        value: 822968249348095bf6d67cac11bb3d79
